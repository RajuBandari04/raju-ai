<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raju AI</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">

    <div class="logo">
        🤖 Raju AI
    </div>

    <button id="newChatBtn">
        + New Chat
    </button>

    <div id="chatHistory">
    </div>

</div>

<div class="main">

    <div class="topbar">
        Raju AI
    </div>

    <div id="chatBox">

        <div class="welcome">

            <h1>🤖 Raju AI</h1>

            <p>
                Ask anything macha 😎
            </p>

        </div>

    </div>

    <div class="bottom">

        <label class="uploadBtn">
            📷
            <input
            type="file"
            id="imageInput"
            hidden>
        </label>

        <textarea
id="prompt"
placeholder="Message Raju AI..."></textarea>

        <button id="sendBtn">
            Send
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
